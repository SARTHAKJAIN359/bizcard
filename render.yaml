services:
  - type: web
    name: bizscanner
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
    packageManagers:
      - type: apt
        packages:
          - tesseract-ocr
    envVars:
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: DATABASE_URL
        fromDatabase:
          name: bizscanner
          property: connectionString
